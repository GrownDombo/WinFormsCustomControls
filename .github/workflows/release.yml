name: Release

# main 브랜치에 커밋이 push될 때마다 이 워크플로를 실행합니다.
on:
  push:
    branches:
      - main

# GitHub Actions가 GITHUB_TOKEN으로 태그와 릴리즈를 만들 수 있게 권한을 부여합니다.
permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      # GitHub Actions 실행 환경에 이 저장소의 코드를 내려받습니다.
      - name: Checkout
        uses: actions/checkout@v4

      # .NET Framework 솔루션을 빌드할 수 있도록 MSBuild를 PATH에 추가합니다.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # AssemblyFileVersion을 읽어서 릴리즈 태그 이름으로 변환합니다.
      # 예: AssemblyFileVersion("1.0.0.0") -> v1.0.0.0
      - name: Read assembly file version
        id: version
        shell: pwsh
        run: |
          $assemblyInfoPath = "WinFormsCustomControls\WinFormsCustomControls\Properties\AssemblyInfo.cs"
          $assemblyInfo = Get-Content -LiteralPath $assemblyInfoPath -Raw
          $match = [regex]::Match($assemblyInfo, 'AssemblyFileVersion\("([^"]+)"\)')

          if (-not $match.Success) {
            throw "AssemblyFileVersion was not found in $assemblyInfoPath."
          }

          $version = $match.Groups[1].Value
          $tag = "v$version"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

          Write-Host "AssemblyFileVersion: $version"
          Write-Host "Release tag: $tag"

      # 이미 공개된 릴리즈는 덮어쓰지 않습니다.
      # 같은 버전이 이미 있으면 실패시키고 AssemblyFileVersion을 올리도록 안내합니다.
      - name: Check release version is unused
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Release $tag already exists. Increase AssemblyFileVersion before pushing again."
            exit 1
          }

          git ls-remote --exit-code --tags origin "refs/tags/$tag" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Tag $tag already exists. Increase AssemblyFileVersion before pushing again."
            exit 1
          }

          if ($LASTEXITCODE -ne 2) {
            throw "Failed to check whether remote tag $tag exists."
          }

          Write-Host "Release version $tag is available."

      # 라이브러리 프로젝트와 데모 프로젝트를 Release 구성으로 빌드합니다.
      - name: Build release
        shell: pwsh
        run: msbuild "WinFormsCustomControls\WinFormsCustomControls.sln" /p:Configuration=Release /p:Platform="Any CPU" /v:minimal

      # 릴리즈에 첨부할 다운로드용 zip 파일을 만듭니다.
      - name: Package release assets
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $distDir = "dist"
          $libraryDir = Join-Path $distDir "library"
          $demoDir = Join-Path $distDir "demo"

          New-Item -ItemType Directory -Force -Path $libraryDir, $demoDir | Out-Null

          Copy-Item -LiteralPath "WinFormsCustomControls\WinFormsCustomControls\bin\Release\WinFormsCustomControls.dll" -Destination $libraryDir

          Copy-Item -LiteralPath "WinFormsCustomControls\WinFormsCustomControls.Demo\bin\Release\WinFormsCustomControls.Demo.exe" -Destination $demoDir
          Copy-Item -LiteralPath "WinFormsCustomControls\WinFormsCustomControls.Demo\bin\Release\WinFormsCustomControls.Demo.exe.config" -Destination $demoDir
          Copy-Item -LiteralPath "WinFormsCustomControls\WinFormsCustomControls.Demo\bin\Release\WinFormsCustomControls.dll" -Destination $demoDir

          Compress-Archive -Path "$libraryDir\*" -DestinationPath "$distDir\WinFormsCustomControls-$tag.zip" -Force
          Compress-Archive -Path "$demoDir\*" -DestinationPath "$distDir\WinFormsCustomControls.Demo-$tag.zip" -Force

      # 현재 커밋 기준으로 GitHub Release를 만들고 zip 파일 2개를 업로드합니다.
      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          gh release create $tag `
            "dist\WinFormsCustomControls-$tag.zip" `
            "dist\WinFormsCustomControls.Demo-$tag.zip" `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "WinFormsCustomControls $tag" `
            --generate-notes
